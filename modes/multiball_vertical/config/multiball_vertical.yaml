mode:
  start_events: start_multiball_vertical
  stop_events: end_multiball_vertical
  priority: 900

multiballs:
  multiball_vertical:
    ball_count: 3
    ball_locks: bd_b_lock
    shoot_again: 0s
    start_events: mode_multiball_vertical_started

    
ball_saves:
